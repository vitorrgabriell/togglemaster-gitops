apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: tech-challenge
  labels:
    app: targeting-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      containers:
        - name: targeting-service
          image: 637423212910.dkr.ecr.us-east-1.amazonaws.com/togglemaster/targeting-service:latest
          ports:
            - containerPort: 8003
          envFrom:
            - secretRef:
                name: targeting-db-secret
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.tech-challenge.svc.cluster.local:8001"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
