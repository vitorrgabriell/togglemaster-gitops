---
apiVersion: v1
kind: Secret
metadata:
  name: auth-db-secret
  namespace: tech-challenge
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:<DB_PASSWORD>@<RDS_ENDPOINT_AUTH>:5432/postgres"
  MASTER_KEY: "<MASTER_KEY>"

---
apiVersion: v1
kind: Secret
metadata:
  name: flag-db-secret
  namespace: tech-challenge
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:<DB_PASSWORD>@<RDS_ENDPOINT_FLAG>:5432/postgres"

---
apiVersion: v1
kind: Secret
metadata:
  name: targeting-db-secret
  namespace: tech-challenge
